<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ce Qui Fait Tenir – Carnet de Bord v5</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root" style="height:100vh"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const Y = "#FFD15C";
    const P = "#511A49";
    const BG = "#F2B9B5";
    const PAPER = "#F5F2EA";

    let nid = 1;

    const D_LABELS = ["Couverture","P 1/10","P 2 & 3/10","P 4 & 5/10","P 6 & 7/10","P 8 & 9/10","P 10/10","4ème de couverture"];
    const SPREAD_TAB = [0,1,2,2,2,3,4,4];
    const PNG_SLOTS = Array.from({length:9},(_,i)=>i+1);

    function BindSVG({ side }) {
      const pts = [40,130,220,310,400,490,580,670,760,850,940];
      return (
        <svg viewBox="0 0 22 1000" preserveAspectRatio="none" style={{ width:22,height:"100%",display:"block",overflow:"visible" }}>
          <g transform={side==="r"?"translate(22,0) scale(-1,1)":undefined}>
            <rect x={13.6} y={0} width={2.8} height={1000} fill="#7a0e0e"/>
            <rect x={13.6} y={0} width={0.8} height={1000} fill="rgba(255,255,255,0.10)"/>
            {pts.map(y=>(
              <g key={y}>
                <rect x={0} y={y+1} width={15} height={7} fill="rgba(0,0,0,0.20)"/>
                <rect x={0} y={y} width={15} height={7} fill="#b81e1e"/>
                <rect x={0} y={y+5} width={15} height={2} fill="rgba(0,0,0,0.18)"/>
                <circle cx={15} cy={y+3.5} r={3} fill="#2a0606"/>
                <circle cx={15} cy={y+3.5} r={3} fill="none" stroke="rgba(255,255,255,0.18)" strokeWidth={0.4}/>
              </g>
            ))}
          </g>
        </svg>
      );
    }

    function CoverPage() {
      const logoSrc = "";
      return (
        <div style={{ width:"100%",height:"100%",position:"relative",overflow:"hidden",
          background:Y,backgroundImage:"repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 1px,transparent 1px,transparent 7px)" }}>
          <div style={{ position:"absolute",left:0,top:0,width:22,height:"100%",zIndex:5,pointerEvents:"none" }}><BindSVG side="l"/></div>
          <div style={{ position:"absolute",top:"30%",left:"52%",transform:"translateX(-50%)",width:"62%",maxWidth:295 }}>
            <div style={{ position:"relative",background:"#EDE0C4",borderRadius:3,padding:"18px 20px 12px",boxShadow:"2px 3px 12px rgba(0,0,0,.2)",transform:"rotate(-1deg)" }}>
              <div style={{ position:"absolute",top:-9,left:"50%",transform:"translateX(-50%)",width:50,height:16,background:"rgba(248,220,148,.82)",borderRadius:2 }}/>
              <input style={{ width:"100%",background:"transparent",border:"none",borderBottom:"1px dashed rgba(80,50,20,.32)",outline:"none",fontFamily:"Georgia,serif",fontSize:16,color:"#3a2510",textAlign:"center",padding:"5px 0" }} placeholder="Nomme ton carnet..." maxLength={40}/>
            </div>
            <span style={{ display:"block",fontFamily:"Arial Black,Arial,sans-serif",fontSize:11,color:P,textAlign:"center",letterSpacing:".08em",textTransform:"uppercase",marginTop:3,opacity:.78,transform:"rotate(-1deg)",lineHeight:1.55 }}>Ce Qui Fait Tenir</span>
            <span style={{ display:"block",fontFamily:"Arial Black,Arial,sans-serif",fontSize:15,color:P,textAlign:"center",letterSpacing:".06em",textTransform:"uppercase",marginTop:12,opacity:.88,transform:"rotate(-1deg)",lineHeight:1.2 }}>Carnet de Bord</span>
          </div>
          <div style={{ position:"absolute",bottom:38,right:16,transform:"rotate(5deg)",width:52,height:52,borderRadius:"50%",overflow:"hidden",boxShadow:"1px 2px 6px rgba(0,0,0,.18)" }}>
            <svg width={52} height={52} viewBox="0 0 60 60"><circle cx={30} cy={30} r={29} fill="white"/><circle cx={30} cy={30} r={25} fill={Y}/><text x={30} y={37} fontFamily="Arial Black,Arial,sans-serif" fontWeight={900} fontSize={21} fill={P} textAnchor="middle">im</text></svg>
          </div>
          <div style={{ position:"absolute",bottom:38,left:"54%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:1,whiteSpace:"nowrap" }}>
            <span style={{ fontFamily:"Georgia,serif",fontStyle:"italic",fontSize:12,color:P,opacity:.82 }}>Manuella</span>
            <a href="https://imagomira.store" target="_blank" style={{ fontSize:10,color:P,textDecoration:"none",opacity:.6,borderBottom:"1px solid "+P }}>imagomira.store</a>
          </div>
        </div>
      );
    }

    function BackCover() {
      return (
        <div style={{ width:"100%",height:"100%",position:"relative",overflow:"hidden",
          background:Y,backgroundImage:"repeating-linear-gradient(45deg,rgba(255,255,255,.05) 0,rgba(255,255,255,.05) 1px,transparent 1px,transparent 7px)" }}>
          <div style={{ position:"absolute",right:0,top:0,width:22,height:"100%",zIndex:5,pointerEvents:"none" }}><BindSVG side="r"/></div>
          <div style={{ position:"absolute",bottom:32,left:"50%",transform:"translateX(-50%)",textAlign:"center",whiteSpace:"nowrap" }}>
            <p style={{ fontSize:9,color:P,opacity:.72,letterSpacing:".02em" }}>© Copyright 2026. <em>IMAGO MIRA</em>&nbsp;&nbsp;Tous droits réservés</p>
          </div>
        </div>
      );
    }

    const WC = ({children,faded}) => (
      <div style={{ background:faded?"rgba(255,255,255,.65)":"rgba(255,255,255,.88)",borderRadius:8,padding:"8px 12px",margin:"3px 0",boxShadow:faded?"none":"0 2px 7px rgba(81,26,73,.09)" }}>{children}</div>
    );
    const BT = ({children}) => <p style={{ fontSize:13,color:P,lineHeight:1.62,marginBottom:6 }}>{children}</p>;
    const NA = (props) => (
      <textarea {...props} style={{ width:"100%",minHeight:58,background:"rgba(255,213,92,.15)",border:"1px solid rgba(81,26,73,.14)",borderRadius:6,padding:"6px 9px",fontFamily:"Arial,sans-serif",fontSize:12,color:P,resize:"none",outline:"none" }}/>
    );
    const Arr = ({children}) => <div style={{ fontSize:13,color:P,fontWeight:"bold",margin:"0 0 3px",display:"flex",gap:5 }}><span>→</span><span>{children}</span></div>;
    const It = ({children}) => <p style={{ fontStyle:"italic",fontSize:12,color:P,margin:0 }}>{children}</p>;

    function PageBody({num}) {
      if(num===1) return <><BT>Il y a eu un jour où j'ai reçu un message sur mon travail. Un simple vocal. Quelques secondes.</BT><BT>Je l'ai écouté. Réécouté. Encore. Pas parce que j'en avais besoin ce jour-là. Mais les semaines suivantes, quand le doute est revenu, et il est toujours revenu, quand j'ai failli tout lâcher, c'est ce vocal que j'allais chercher.</BT><WC><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",margin:0 }}>"Ce n'est pas la motivation qui fait tenir.<br/>C'est le carburant qu'on a constitué avant la panne."</p></WC><BT>Sauf que je dépendais de quelqu'un d'autre pour l'avoir. Je ne pouvais pas décider quand il arrivait.</BT><BT>Alors j'ai appris à en créer moi-même. À reconnaître ce qui me recharge. À le stocker. À y revenir. C'est exactement ce qu'on va faire ensemble ici.</BT><BT><strong>Je ne te donne pas un poisson. Je t'apprends à pêcher.</strong></BT></>;
      if(num===2) return <><BT>La plupart d'entre nous ont déjà vécu ce moment. On a souri, on a ressenti quelque chose de chaud dans la poitrine, et on l'a laissé filer. Il est temps de le retrouver.</BT><WC><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",margin:"0 0 5px" }}>"Y a-t-il un message, un vocal, une image reçu sur ton travail que tu relis encore, parce que ça t'a rendue fière ou vivante ?"</p><NA placeholder="Écris ici..."/></WC><Arr>Sauvegarde-le quelque part d'accessible.</Arr><Arr>Nomme-le. C'est ton premier carburant.</Arr><WC faded><It>Tu n'en trouves pas encore ? Note le moment que tu attends.</It></WC></>;
      if(num===3) return <><BT>Pas les choses qu'on est supposées aimer. Les vraies, celles qui, concrètement, dans ta vraie vie, te rechargent.</BT><WC><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",margin:"0 0 5px" }}>"3 choses concrètes qui te rechargent, pas « le yoga », mais « marcher 20 min seule le matin. »"</p><NA placeholder={"1.\n2.\n3."}/></WC><WC faded><It>Ces 3 choses sont ta liste de secours. Quand tu te vides, reviens ici et fais-en une.</It></WC></>;
      if(num===4) return <><BT>La peur ne disparaît pas avant d'agir. Elle disparaît juste après. Cette rubrique est là pour te rappeler que tu l'as déjà fait.</BT><WC><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",margin:"0 0 5px" }}>"Quelle action as-tu posée même avec la boule au ventre ? Grande ou petite, ça compte pareil."</p><NA placeholder="Écris ici..."/></WC><WC faded><It>Ce que tu viens d'écrire est une preuve. Garde-la. C'est du carburant.</It></WC></>;
      if(num===5) return <><BT>Une ancre, c'est une phrase, un mot, une intention qui te ramène à toi quand tout part dans tous les sens. Elle change selon les périodes.</BT><WC><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",margin:"0 0 5px" }}>"Quelle phrase, quel mot te recentre en ce moment ? Quelque chose que tu pourrais relire quand ça vacille."</p><NA placeholder="Écris ici..."/></WC><Arr>Note-la quelque part de visible.</Arr><WC faded><It>Pas d'ancre qui vient ? Commence par ce que tu voudrais ressentir.</It></WC></>;
      if(num===6) return <><BT>On sait souvent ce qu'on devrait vouloir. Cette rubrique demande autre chose : ce dont on a vraiment besoin, là, maintenant.</BT><WC><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",margin:"0 0 5px" }}>"Pas ce que tu devrais vouloir. Ce dont tu as réellement besoin en ce moment."</p><NA placeholder="Écris ici..."/></WC><WC faded><It>Nommer un besoin, c'est déjà en prendre soin.</It></WC></>;
      if(num===7) return <><BT>Pas une liste. Pas un plan. Une seule chose, la plus petite possible, qui compte vraiment et que tu peux faire.</BT><WC><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",margin:"0 0 5px" }}>"Si tu ne devais faire qu'une seule chose après avoir refermé ce carnet, quelle serait-elle ?"</p><NA placeholder="Une seule chose..."/></WC><WC faded><It>Les grandes avancées sont faites de petites étapes qu'on a accepté de prendre au sérieux.</It></WC></>;
      if(num===8) return <><BT>Pour ce qui n'entre dans aucune case. Mots, fragments, listes, colère, gratitude, doutes, tout ce qui mérite d'être posé.</BT><WC><textarea placeholder="Exprime-toi librement..." style={{ width:"100%",minHeight:110,background:"rgba(255,213,92,.15)",border:"1px solid rgba(81,26,73,.14)",borderRadius:6,padding:"6px 9px",fontFamily:"Arial,sans-serif",fontSize:12,color:P,resize:"none",outline:"none" }}/></WC><WC faded><It>Tu n'as pas à tout avoir compris pour avancer. Tu as juste à faire le prochain pas.</It></WC></>;
      if(num===9){
        const FC=({title,desc,ex,concl})=>(
          <WC><div style={{ padding:"4px 9px" }}><p style={{ fontFamily:"Arial Black,Arial,sans-serif",fontWeight:900,fontSize:12,color:P,textAlign:"center",margin:"0 0 2px" }}>{title}</p><div style={{ height:1,background:P,opacity:.1,margin:"0 0 4px" }}/><p style={{ fontStyle:"italic",fontSize:12,color:P,textAlign:"center",lineHeight:1.4,margin:"0 0 3px" }}>{desc}</p><p style={{ fontStyle:"italic",fontSize:11,color:P,textAlign:"center",opacity:.82,margin:"0 0 3px" }}>{ex}</p><p style={{ fontFamily:"Arial Black,Arial,sans-serif",fontWeight:900,fontSize:9,color:P,textAlign:"center",margin:0 }}>{concl}</p></div></WC>
        );
        return <><BT>Trois types, trois besoins différents.</BT><FC title="Le moment-preuve" desc="Un retour extérieur qui témoigne que ton travail a eu un impact." ex="Un message touché, un commentaire inattendu, une vente qui t'a surprise." concl="CE QUE TU FAIS COMPTE."/><FC title="Le geste-ancre" desc="Un acte simple que tu peux faire seule, qui te reconnecte à toi." ex="Rouvrir ton premier projet, relire pourquoi tu as commencé." concl="JE SUIS ENCORE LÀ."/><FC title="La vision-ressource" desc="Une image, une phrase future qui te tire vers l'avant." ex="Ce que tu veux construire. La créatrice que tu deviens." concl="IL Y A UN APRÈS."/><WC faded><It>Lequel te parle le plus ? Note-le. C'est le début de ta réserve.</It></WC></>;
      }
      if(num===10) return <><BT>Tu viens d'identifier ton premier carburant. C'est déjà plus que ce que font la plupart des entrepreneures. Elles avancent à bout de souffle, en espérant que la motivation revienne.</BT><div style={{ textAlign:"center",margin:"6px 0" }}><p style={{ fontFamily:"Arial Black,Arial,sans-serif",fontWeight:900,fontSize:13,color:P,lineHeight:1.4 }}>Tenir, ça s'apprend. Ça se construit. Ça se pratique.</p></div><WC><p style={{ fontSize:12,color:P,margin:"0 0 6px" }}>Dans le programme <strong>Ce qui fait tenir</strong>, je t'accompagne :</p><div style={{ borderTop:"1px solid rgba(81,26,73,.1)",paddingTop:6,display:"flex",flexDirection:"column",gap:5 }}>{[["IDENTIFIER","tout ce qui te recharge, même ce que tu n'avais jamais nommé."],["CONSTRUIRE","de nouveaux carburants consciemment."],["ACTIVER","le réflexe, pas la dépendance."]].map(([k,v])=><div key={k} style={{ display:"grid",gridTemplateColumns:"72px 1fr",gap:6 }}><span style={{ fontFamily:"Arial Black,Arial,sans-serif",fontWeight:900,fontSize:10,color:P }}>{k}</span><span style={{ fontSize:12,color:P,lineHeight:1.4 }}>{v}</span></div>)}</div></WC><p style={{ fontStyle:"italic",fontSize:12,color:P,marginTop:6 }}>Ce n'est pas une formation de plus. C'est le cadre que tu t'appropries.<br/>Tu veux être prévenue en avant-première ? Clique ci-dessous.</p><div style={{ textAlign:"center",marginTop:8 }}><a href="https://imagomira.store/reste-informee" target="_blank" style={{ background:P,color:"#fff",borderRadius:40,padding:"8px 20px",fontFamily:"Arial Black,Arial,sans-serif",fontWeight:900,fontSize:11,textDecoration:"none",display:"inline-block" }}>↺ Je veux être informée</a></div></>;
      return null;
    }

    const TITLES=["","Il y a eu un jour","Ton premier carburant","Ce qui me ressource","Malgré la peur","Mon ancre du moment","Ce dont j'ai besoin","Ma prochaine étape","Espace libre","Les 3 formes de carburant","Et maintenant ?"];

    function InnerPage({num}) {
      return (
        <div style={{ flex:1,height:"100%",display:"flex",flexDirection:"column",background:PAPER,overflow:"hidden" }}>
          <div style={{ height:7,width:"100%",flexShrink:0,background:"rgba(81,26,73,.07)" }}/>
          <div style={{ flex:1,padding:"11px 16px 4px",display:"flex",flexDirection:"column",overflow:"hidden",backgroundImage:"repeating-linear-gradient(transparent 0px,transparent 25px,rgba(81,26,73,.08) 26px)",backgroundSize:"100% 26px" }}>
            <div style={{ marginBottom:8 }}>
              <div style={{ display:"flex",alignItems:"center",gap:7,marginBottom:3 }}>
                <span style={{ background:P,color:Y,fontFamily:"Arial Black,Arial,sans-serif",fontSize:8,padding:"2px 8px",borderRadius:20,flexShrink:0 }}>{String(num).padStart(2,"0")}</span>
                <span style={{ fontFamily:"Arial Black,Arial,sans-serif",fontWeight:900,fontSize:13,color:P,letterSpacing:".05em",textTransform:"uppercase",lineHeight:1.2 }}>{TITLES[num]}</span>
              </div>
              <div style={{ height:1,background:P,opacity:.18,marginBottom:8 }}/>
            </div>
            <PageBody num={num}/>
          </div>
          <div style={{ flexShrink:0,padding:"2px 16px 5px",textAlign:"right",background:PAPER }}>
            <a href="https://imagomira.store" target="_blank" style={{ fontStyle:"italic",fontSize:11,color:P,textDecoration:"none",opacity:.62,borderBottom:"1px dotted "+P }}>imagomira.store</a>
          </div>
          <div style={{ height:7,width:"100%",flexShrink:0,background:"rgba(81,26,73,.07)" }}/>
        </div>
      );
    }

    const SPREADS=[
      {type:"cover"},
      {type:"spread",left:"y",right:1},
      {type:"spread",left:2,right:3},
      {type:"spread",left:4,right:5},
      {type:"spread",left:6,right:7},
      {type:"spread",left:8,right:9},
      {type:"spread",left:10,right:"y"},
      {type:"back"}
    ];

    function SpreadView({idx}){
      const c=SPREADS[idx];
      const yel=<div style={{ flex:1,height:"100%",background:Y }}/>;
      const spine=<div style={{ width:2,flexShrink:0,background:"rgba(0,0,0,.1)" }}/>;
      if(c.type==="cover") return <CoverPage/>;
      if(c.type==="back") return <BackCover/>;
      const L=c.left==="y"?yel:<InnerPage num={c.left}/>;
      const R=c.right==="y"?yel:<InnerPage num={c.right}/>;
      return <div style={{ display:"flex",width:"100%",height:"100%" }}>{L}{spine}{R}</div>;
    }

    function BadgePanel({ onSrc }) {
      const [txt, setTxt] = useState("Priorité");
      return (
        <div>
          <div style={{ fontFamily:"Arial Black,Arial,sans-serif",fontSize:9,letterSpacing:".06em",textTransform:"uppercase",color:"rgba(255,209,92,.6)",marginBottom:7 }}>🏷 Badge</div>
          <input value={txt} onChange={e=>setTxt(e.target.value)} onMouseDown={e=>e.stopPropagation()}
            placeholder="Tape le texte..." maxLength={24}
            style={{ width:"100%",background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,209,92,.35)",borderRadius:8,padding:"6px 10px",fontFamily:"Arial,sans-serif",fontSize:11,color:"#fff",outline:"none",marginBottom:8 }}/>
          <div onMouseDown={e=>onSrc("badge",txt||"Badge",e)}
            style={{ cursor:"grab",display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"rgba(255,255,255,.1)",border:"1.5px solid rgba(255,209,92,.4)",borderRadius:20,padding:"7px 14px",userSelect:"none" }}>
            <span style={{ fontFamily:"Arial Black,Arial,sans-serif",fontSize:10,color:Y,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:110 }}>{txt||"Badge"}</span>
            <span style={{ fontSize:9,color:"rgba(255,255,255,.35)" }}>⠿</span>
          </div>
          <div style={{ fontSize:9,color:"rgba(255,255,255,.32)",fontStyle:"italic",marginTop:5,textAlign:"center" }}>clique + glisse sur le carnet</div>
        </div>
      );
    }

    function CarnetV5() {
      const [sp, setSp] = useState(0);
      const [stickers, setStickers] = useState([]);
      const [dragId, setDragId] = useState(null);
      const [ghost, setGhost] = useState(null);
      const [over, setOver] = useState(false);
      const [toast, setToast] = useState("");
      const bookRef = useRef(null);
      const off = useRef({x:0,y:0});
      const spRef = useRef(sp);
      useEffect(()=>{ spRef.current = sp; },[sp]);
      const isSpread = sp>=1 && sp<=6;
      const at = SPREAD_TAB[sp];

      const showToast = (m) => { setToast(m); setTimeout(()=>setToast(""),2400); };

      const onSrc = useCallback((type, value, e) => {
        e.preventDefault();
        setGhost({type,value,x:e.clientX-30,y:e.clientY-30});
        setOver(true);
        const mv = (ev) => setGhost({type,value,x:ev.clientX-30,y:ev.clientY-30});
        const up = (ev) => {
          document.removeEventListener("mousemove",mv);
          document.removeEventListener("mouseup",up);
          setGhost(null); setOver(false);
          if (!bookRef.current) return;
          const r = bookRef.current.getBoundingClientRect();
          if (ev.clientX>=r.left && ev.clientX<=r.right && ev.clientY>=r.top && ev.clientY<=r.bottom) {
            setStickers(p=>[...p,{
              id:nid++, type, value,
              x:Math.max(0,ev.clientX-r.left-24),
              y:Math.max(0,ev.clientY-r.top-24),
              text: type==="badge" ? value : "",
              spread: spRef.current
            }]);
          }
        };
        document.addEventListener("mousemove",mv);
        document.addEventListener("mouseup",up);
      },[]);

      const onStk = useCallback((id, e) => {
        if ((e.target).tagName==="TEXTAREA") return;
        if ((e.target).tagName==="INPUT") return;
        if ((e.target).dataset.del) return;
        e.preventDefault(); e.stopPropagation();
        const sx=e.clientX, sy=e.clientY;
        let moving = false;
        const stk = stickers.find(x=>x.id===id);
        if (!stk || !bookRef.current) return;
        const mv = (ev) => {
          if (!moving) {
            if (Math.abs(ev.clientX-sx)<5 && Math.abs(ev.clientY-sy)<5) return;
            moving = true;
            setDragId(id);
            const r = bookRef.current.getBoundingClientRect();
            off.current = {x:sx-r.left-stk.x, y:sy-r.top-stk.y};
          }
          const r = bookRef.current.getBoundingClientRect();
          setStickers(p=>p.map(x=>x.id===id?{...x,
            x:Math.max(0,Math.min(ev.clientX-r.left-off.current.x,r.width-10)),
            y:Math.max(0,Math.min(ev.clientY-r.top-off.current.y,r.height-10))
          }:x));
        };
        const up = () => { document.removeEventListener("mousemove",mv); document.removeEventListener("mouseup",up); setDragId(null); };
        document.addEventListener("mousemove",mv);
        document.addEventListener("mouseup",up);
      },[stickers]);

      const del = (id) => setStickers(p=>p.filter(x=>x.id!==id));
      const upd = (id, text) => setStickers(p=>p.map(x=>x.id===id?{...x,text}:x));

      const visibleStickers = stickers.filter(s=>s.spread===sp);

      const TABS=[{l:"Couverture",s:0},{l:"Un jour",s:1},{l:"Carburant",s:2},{l:"3\u00a0formes",s:5},{l:"Et\u00a0après\u00a0?",s:6}];

      return (
        <div style={{ display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",fontFamily:"Arial,sans-serif",background:BG }}>

          {/* NAV */}
          <nav style={{ background:P,display:"flex",alignItems:"center",flexShrink:0,height:48,zIndex:20 }}>
            <div style={{ width:172,flexShrink:0,display:"flex",alignItems:"center",gap:7,paddingLeft:12 }}>
              <div style={{ background:Y,borderRadius:"50%",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",color:P,fontSize:13,fontWeight:900,flexShrink:0 }}>⚡</div>
              <div>
                <div style={{ fontFamily:"Arial Black,Arial,sans-serif",fontSize:11,color:Y,letterSpacing:".03em",whiteSpace:"nowrap",lineHeight:1.3 }}>CE QUI FAIT TENIR</div>
                <div style={{ fontSize:10,color:"rgba(255,255,255,.6)",whiteSpace:"nowrap" }}>Carnet de Bord</div>
              </div>
            </div>
            <div style={{ flex:1,display:"flex",alignItems:"center",justifyContent:"center",height:"100%",gap:4 }}>
              {TABS.map((t,i)=>(
                <button key={i} onClick={()=>setSp(t.s)} style={{ background:"transparent",border:"none",
                  borderBottom:at===i?`2.5px solid ${Y}`:"2.5px solid transparent",
                  padding:"8px 10px 5px",cursor:"pointer",opacity:at===i?1:.55,
                  color:"#fff",fontFamily:"Arial,sans-serif",fontSize:12,
                  fontWeight:at===i?700:400,whiteSpace:"nowrap",height:"100%",transition:"opacity .2s" }}>{t.l}</button>
              ))}
            </div>
          </nav>

          {/* BODY */}
          <div style={{ flex:1,display:"flex",overflow:"hidden" }}>

            {/* PANNEAU STICKERS */}
            <aside style={{ width:172,flexShrink:0,background:P,display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"4px 0 20px rgba(81,26,73,.4)" }}>
              <div style={{ padding:"12px 13px 8px",borderBottom:"1px solid rgba(255,209,92,.18)" }}>
                <div style={{ fontFamily:"Arial Black,Arial,sans-serif",fontSize:11,letterSpacing:".06em",textTransform:"uppercase",color:Y }}>Mes stickers</div>
              </div>
              <div style={{ flex:1,overflowY:"auto",padding:"12px 11px",display:"flex",flexDirection:"column",gap:16 }}>

                {/* 9 emplacements PNG */}
                <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6 }}>
                  {PNG_SLOTS.map(n=>(
                    <div key={n} onMouseDown={e=>onSrc("png",`stickers/sticker${n}.png`,e)}
                      style={{ cursor:"grab",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                        width:44,height:44,background:"rgba(255,255,255,.07)",borderRadius:10,userSelect:"none",
                        border:"1.5px dashed rgba(255,209,92,.3)",gap:2 }}
                      onMouseEnter={e=>(e.currentTarget.style.background="rgba(255,209,92,.15)")}
                      onMouseLeave={e=>(e.currentTarget.style.background="rgba(255,255,255,.07)")}>
                      <span style={{ fontSize:16,opacity:.5 }}>🖼</span>
                      <span style={{ fontSize:8,color:"rgba(255,209,92,.6)",fontFamily:"Arial Black,Arial,sans-serif" }}>{n}</span>
                    </div>
                  ))}
                </div>

                {/* Post-it */}
                <div>
                  <div style={{ display:"flex",alignItems:"baseline",gap:6,marginBottom:8 }}>
                    <div style={{ fontFamily:"Arial Black,Arial,sans-serif",fontSize:9,letterSpacing:".06em",textTransform:"uppercase",color:"rgba(255,209,92,.6)" }}>Post-it</div>
                    <div style={{ fontSize:9,color:"rgba(255,255,255,.35)",fontStyle:"italic" }}>clique et glisse</div>
                  </div>
                  <div onMouseDown={e=>onSrc("postit","",e)}
                    style={{ cursor:"grab",background:Y,borderRadius:6,padding:"10px",userSelect:"none",
                      boxShadow:"2px 3px 8px rgba(0,0,0,.22)",textAlign:"center" }}>
                    <div style={{ fontSize:12,color:P,fontWeight:"bold",marginBottom:4 }}>Post-it</div>
                    <div style={{ fontSize:11,color:P,fontWeight:"bold" }}>Tes Notes</div>
                  </div>
                </div>

                {/* Badge */}
                <BadgePanel onSrc={onSrc}/>

              </div>

              <div style={{ padding:10,borderTop:"1px solid rgba(255,209,92,.16)",display:"flex",flexDirection:"column",gap:6 }}>
                <button onClick={()=>showToast("💾 Sauvegardé ✓")} style={{ width:"100%",padding:"8px 10px",border:"none",borderRadius:8,background:Y,color:P,fontFamily:"Arial Black,Arial,sans-serif",fontSize:10,cursor:"pointer" }}>💾 Sauvegarder</button>
                <button onClick={()=>{ setStickers([]); showToast("Réinitialisé ✓"); }} style={{ width:"100%",padding:"8px 10px",border:"none",borderRadius:8,background:"rgba(220,80,80,.22)",color:"#ffb3b3",fontFamily:"Arial Black,Arial,sans-serif",fontSize:10,cursor:"pointer" }}>↺ Réinitialiser</button>
              </div>
            </aside>

            {/* ZONE CARNET */}
            <div style={{ flex:1,display:"flex",flexDirection:"column",overflow:"hidden" }}>
              <div style={{ display:"flex",justifyContent:"center",alignItems:"center",gap:14,padding:"8px 0 4px",flexShrink:0 }}>
                <button onClick={()=>sp>0&&setSp(sp-1)} disabled={sp===0} style={{ border:"none",borderRadius:"50%",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:sp===0?"not-allowed":"pointer",background:sp===0?"rgba(81,26,73,.1)":Y }}>
                  <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="#511A49" strokeWidth={2}><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span style={{ fontSize:11,color:"rgba(81,26,73,.5)",minWidth:130,textAlign:"center" }}>{D_LABELS[sp]}</span>
                <button onClick={()=>sp<7&&setSp(sp+1)} disabled={sp===7} style={{ border:"none",borderRadius:"50%",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:sp===7?"not-allowed":"pointer",background:sp===7?"rgba(81,26,73,.1)":Y }}>
                  <svg width={12} height={12} viewBox="0 0 24 24" fill="none" stroke="#511A49" strokeWidth={2}><polyline points="9 18 15 12 9 6"/></svg>
                </button>
              </div>

              <div style={{ flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 12px 12px",overflow:"hidden" }}>
                <div style={{ position:"relative",height:"100%",aspectRatio:isSpread?"420/297":"210/297",maxWidth:"100%",borderRadius:4,overflow:"hidden",boxShadow:"0 8px 32px rgba(81,26,73,.3)",outline:over?"3px dashed rgba(255,209,92,.6)":"none",outlineOffset:-3 }}>
                  <div ref={bookRef} style={{ width:"100%",height:"100%" }}>
                    <SpreadView idx={sp}/>
                  </div>

                  {/* STICKERS OVERLAY */}
                  <div style={{ position:"absolute",inset:0,pointerEvents:"none",zIndex:5 }}>
                    {visibleStickers.map(s=>(
                      <div key={s.id} onMouseDown={e=>onStk(s.id,e)} className="sp"
                        style={{ position:"absolute",left:s.x,top:s.y,cursor:dragId===s.id?"grabbing":"grab",userSelect:"none",pointerEvents:"all",zIndex:dragId===s.id?100:10,opacity:dragId===s.id?.9:1 }}>
                        <div data-del="1" onClick={()=>del(s.id)} className="xb"
                          style={{ position:"absolute",top:-9,right:-9,width:20,height:20,background:"#c0392b",color:"#fff",borderRadius:"50%",fontSize:13,lineHeight:"20px",textAlign:"center",cursor:"pointer",zIndex:20,fontWeight:"bold",display:"none" }}>×</div>
                        {s.type==="png" && (
                          <div style={{ width:72,height:72,background:"rgba(255,209,92,.15)",border:"2px dashed rgba(255,209,92,.5)",borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3 }}>
                            <span style={{ fontSize:22,opacity:.6 }}>🖼</span>
                            <span style={{ fontSize:8,color:P,opacity:.5,fontFamily:"Arial Black,Arial,sans-serif" }}>{s.value.replace("stickers/","").replace(".png","")}</span>
                          </div>
                        )}
                        {s.type==="postit" && (
                          <div style={{ width:135,minHeight:105,background:Y,borderRadius:4,boxShadow:"3px 4px 14px rgba(0,0,0,.22)",padding:"10px 10px 6px",display:"flex",flexDirection:"column" }}>
                            <textarea value={s.text} onChange={e=>upd(s.id,e.target.value)} placeholder="Écris ta note…"
                              onMouseDown={e=>e.stopPropagation()}
                              style={{ flex:1,outline:"none",border:"none",background:"transparent",fontFamily:"Georgia,serif",fontSize:12,lineHeight:1.5,color:P,resize:"none",width:"100%",minHeight:66 }}/>
                            <div style={{ fontSize:9,color:"rgba(81,26,73,.4)",textAlign:"right",marginTop:4 }}>⠿ déplacer</div>
                          </div>
                        )}
                        {s.type==="badge" && (
                          <div style={{ background:P,color:Y,borderRadius:20,padding:"7px 18px",fontFamily:"Arial Black,Arial,sans-serif",fontSize:11,minWidth:80,textAlign:"center",whiteSpace:"nowrap",boxShadow:"2px 3px 10px rgba(0,0,0,.22)" }}>
                            {s.text||"Badge"}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>

                  {/* HINT */}
                  {visibleStickers.length===0 && sp!==0 && sp!==7 && (
                    <div style={{ position:"absolute",inset:0,display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:38,pointerEvents:"none",zIndex:3 }}>
                      <div style={{ background:"rgba(81,26,73,.07)",borderRadius:12,padding:"6px 14px",textAlign:"center" }}>
                        <div style={{ fontSize:18,marginBottom:2 }}>👆</div>
                        <div style={{ fontSize:11,color:P,opacity:.5,fontStyle:"italic" }}>Glisse un sticker où tu veux sur le carnet.</div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>

          {ghost&&(
            <div style={{ position:"fixed",left:ghost.x,top:ghost.y,pointerEvents:"none",opacity:.75,zIndex:9999,transform:"scale(1.1)" }}>
              {ghost.type==="png"&&<div style={{ width:60,height:60,background:"rgba(255,209,92,.3)",border:"2px dashed rgba(255,209,92,.7)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24 }}>🖼</div>}
              {ghost.type==="postit"&&<div style={{ width:120,height:90,background:Y,borderRadius:4,boxShadow:"3px 4px 14px rgba(0,0,0,.25)" }}/>}
              {ghost.type==="badge"&&<div style={{ background:P,color:Y,borderRadius:20,padding:"7px 18px",fontFamily:"Arial Black,Arial,sans-serif",fontSize:11 }}>{ghost.value}</div>}
            </div>
          )}
          {toast&&<div style={{ position:"fixed",bottom:20,right:20,background:P,color:Y,padding:"10px 18px",borderRadius:10,fontFamily:"Arial Black,Arial,sans-serif",fontSize:12,boxShadow:"0 4px 16px rgba(0,0,0,.3)",zIndex:9999 }}>{toast}</div>}
          <style>{`.sp:hover .xb{display:block!important}`}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CarnetV5/>);
  </script>
</body>
</html>
